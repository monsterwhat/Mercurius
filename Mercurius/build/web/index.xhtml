<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Inicio de Sesion</title>
        <meta charset="utf-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1"/>
        <link rel="stylesheet" href="bulma/css/bulma.min.css"/>

    </h:head>
    <h:body>
        
        <section class="hero is-warning is-fullheight">
            <div class="hero-body"> 
                <div class="container">
                    <p:messages styleClass="message" showDetail="true" closable="true" >
                        <p:autoUpdate/>
                    </p:messages>  
                    <div class="columns is-centered">
                        <div class="column is-5-tablet is-4-desktop is-3-widescreen ">
                            <h:form id="formUserLogin" class="box">
                                <div class="field">
                                    <label for="" class="label">Username</label>
                                    <p:inputText class="input is-rounded is-dark" placeholder="Username" id="Username" required="true" value="#{Login}"/>
                                </div>
                                <div class="field">
                                    <label for="" class="label">Password</label>
                                    <p:inputText class="input is-rounded is-dark" type="password" placeholder="Password" id="password" required="true"/>
                                </div>
                                <center>
                                    <div class="field">
                                        <p:commandButton class="button is-success is-rounded" value="Login" update="@none" action="#{LoginController.confirmLogin}"/>
                                    </div> 
                                </center>
                            </h:form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </h:body>
    <footer class="footer">
        <div class="content has-text-centered">
            <p>
                <strong>Mercurius</strong>
                <br></br>
                <a href="https://github.com/monsterwhat/Mercurius"><img src="https://github.com/monsterwhat/Mercurius/raw/Master/Mercurius.png" height="80" width="80" alt="Mercurius"/></a>
            </p>
        </div>
    </footer>
</html>
